name: Create Release Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: create-release-tag-main
  cancel-in-progress: false

jobs:
  create_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        id: tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          INITIAL_VERSION: 0.0.0
          TAG_PREFIX: ""
          RELEASE_BRANCHES: main
          DEFAULT_BRANCH: main
          VERBOSE: false

      - name: Write summary
        run: |
          echo "Created release tag: \`${{ steps.tag.outputs.new_tag }}\`" >> "$GITHUB_STEP_SUMMARY"