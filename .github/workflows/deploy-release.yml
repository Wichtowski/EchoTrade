name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to deploy, for example 1.2.3
        required: true
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate_tag:
    name: Validate release tag
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.validate.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: validate
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_VERSION"
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$RELEASE_VERSION" >/dev/null; then
            echo "::error::Tag does not exist: $RELEASE_VERSION"
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  deploy_backend:
    name: Deploy backend to VPS
    needs: validate_tag
    uses: ./.github/workflows/deploy-backend.yml
    with:
      version: ${{ needs.validate_tag.outputs.version }}
    secrets: inherit

  deploy_dash:
    name: Deploy dashboard to Cloudflare Pages
    needs: validate_tag
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      version: ${{ needs.validate_tag.outputs.version }}
    secrets: inherit
