name: Deploy Dashboard

on:
  workflow_call:
    inputs:
      version:
        description: Release tag to deploy, for example 1.2.3
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/dash

    env:
      VITE_API_BASE_URL: https://apiechotrade.oskarwichtowski.com
      VITE_APP_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile

      - name: Build static dashboard
        run: bun run build

      - name: Deploy to Cloudflare Pages
        run: bun x wrangler pages deploy dist/client --project-name "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}" --branch main --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}