services:
  echo-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  echo-rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  echo-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  echo-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  echo-core:
    build:
      context: .
      dockerfile: app/core/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: uv run uvicorn core.app:app --host 0.0.0.0 --port 8000
    depends_on:
      - echo-postgres
      - echo-rabbitmq
      - echo-redis
      - echo-mongo

  echo-worker:
    build:
      context: .
      dockerfile: app/libworker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: uv run celery -A libworker.celery_app worker --loglevel=info --without-gossip --without-mingle
    depends_on:
      - echo-postgres
      - echo-rabbitmq
      - echo-redis
      - echo-mongo

  echo-n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: echo-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: Europe/Warsaw
      ECHO_INTERNAL_API_TOKEN: ${ECHO_INTERNAL_API_TOKEN}
      ECHO_AUTOMATION_USER_ID: ${ECHO_AUTOMATION_USER_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - echo-postgres

  echo-caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - echo-core
      - echo-n8n

  echo-mail:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: ${ECHO_MAIL_HOSTNAME}
    domainname: ${ECHO_MAIL_DOMAIN}
    restart: unless-stopped
    env_file:
      - ./infra/mailserver/docker-mailserver.env
    ports:
      - "25:25"
      - "587:587"
      - "143:143"
      - "993:993"
    volumes:
      - ./infra/mailserver/docker-data/dms/mail-data/:/var/mail/
      - ./infra/mailserver/docker-data/dms/mail-state/:/var/mail-state/
      - ./infra/mailserver/docker-data/dms/mail-logs/:/var/log/mail/
      - ./infra/mailserver/docker-data/dms/config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    cap_add:
      - NET_ADMIN

volumes:
  pgdata:
  n8n_data:
  rabbitmq_data:
  redis_data:
  mongo_data:
  caddy_data:
  caddy_config:
