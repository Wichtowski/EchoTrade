services:
  echo-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - data_net
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
    networks:
      - data_net
    mem_limit: 512mb
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - data_net
    mem_limit: 256m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    networks:
      - data_net
    mem_limit: 768m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-core:
    build:
      context: .
      dockerfile: app/core/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: /opt/venv/bin/uvicorn core.app:app --host 0.0.0.0 --port 8000
    depends_on:
      - echo-postgres
      - echo-rabbitmq
      - echo-redis
      - echo-mongo
    expose:
      - "8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app_net
      - data_net
    mem_limit: 768m
    cpus: "1.0"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-worker:
    build:
      context: .
      dockerfile: app/libworker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: /opt/venv/bin/celery -A libworker.celery_app worker --loglevel=info --without-gossip --without-mingle
    depends_on:
      - echo-postgres
      - echo-rabbitmq
      - echo-redis
      - echo-mongo
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app_net
      - data_net
    mem_limit: 1g
    cpus: "1.5"
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: echo-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: Europe/Warsaw
      ECHO_INTERNAL_API_TOKEN: ${ECHO_INTERNAL_API_TOKEN}
      ECHO_AUTOMATION_USER_ID: ${ECHO_AUTOMATION_USER_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - echo-postgres
    expose:
      - "5678"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - app_net
      - data_net
    mem_limit: 768m
    cpus: "1.0"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ECHO_HTTP_PORT}:80"
      - "${ECHO_HTTPS_PORT}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - echo-core
      - echo-n8n
    networks:
      - edge_net
      - app_net
    mem_limit: 256m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  echo-mail:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: ${ECHO_MAIL_HOSTNAME}
    domainname: ${ECHO_MAIL_DOMAIN}
    restart: unless-stopped
    env_file:
      - ./infra/mailserver/docker-mailserver.env
    ports:
      - "${ECHO_MAIL_PORT_25}:25"
      - "${ECHO_MAIL_PORT_587}:587"
      - "${ECHO_MAIL_PORT_143}:143"
      - "${ECHO_MAIL_PORT_993}:993"
    volumes:
      - mail_data:/var/mail/
      - mail_state:/var/mail-state/
      - mail_logs:/var/log/mail/
      - mail_config:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    cap_add:
      - NET_ADMIN
    networks:
      - mail_net
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  n8n_data:
  rabbitmq_data:
  redis_data:
  mongo_data:
  caddy_data:
  caddy_config:
  mail_data:
  mail_state:
  mail_logs:
  mail_config:

networks:
  edge_net:
  app_net:
  data_net:
    internal: true
  mail_net:
